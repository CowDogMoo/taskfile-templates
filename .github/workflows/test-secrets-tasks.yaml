---
name: Test Secrets Tasks

on:
  pull_request:
    branches:
      - main
    paths:
      - "secrets/local/Taskfile.yaml"
      - ".github/workflows/test-secrets-tasks.yaml"
  push:
    branches:
      - main
    paths:
      - "secrets/local/Taskfile.yaml"
      - ".github/workflows/test-secrets-tasks.yaml"
  workflow_dispatch:

env:
  TASK_VERSION: 3.38.0
  TASK_X_REMOTE_TASKFILES: 1

permissions:
  contents: read

jobs:
  test-secrets-tasks:
    name: Test Local Secrets Tasks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secrets/local
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup go-task
        uses: rnorton5432/setup-task@eec4717ae80f02d1614a4fecfa4a55d507768696 # v1.0.0
        with:
          task-version: ${{ env.TASK_VERSION }}

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Install sops
        run: |
          SOPS_VERSION=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -LO "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x "sops-${SOPS_VERSION}.linux.amd64"
          sudo mv "sops-${SOPS_VERSION}.linux.amd64" /usr/local/bin/sops

      - name: Test secrets:local:ensure-dependencies
        run: |
          task -t Taskfile.yaml ensure-dependencies
          echo "secrets:local:ensure-dependencies passed"

      - name: Test secrets:local:create-age-keypair
        run: |
          task -t Taskfile.yaml create-age-keypair AGE_DIR=/tmp/test-age AGE_FILE=/tmp/test-age/keys.txt
          test -f /tmp/test-age/keys.txt
          echo "secrets:local:create-age-keypair passed"

      - name: Create test file for encryption
        run: |
          cat > /tmp/test-secrets.yaml << 'EOF'
          apiVersion: v1
          kind: Secret
          metadata:
            name: test-secret
          data:
            age_key: c29tZS1zZWNyZXQta2V5
            cloudflare: Y2xvdWRmbGFyZS10b2tlbg==
          EOF

      - name: Test secrets:local:encrypt-file
        run: |
          task -t Taskfile.yaml encrypt-file \
            AGE_FILE=/tmp/test-age/keys.txt \
            INPUT_FILE=/tmp/test-secrets.yaml \
            OUTPUT_FILE=/tmp/test-secrets.enc.yaml
          test -f /tmp/test-secrets.enc.yaml
          echo "secrets:local:encrypt-file passed"

      - name: Test secrets:local:decrypt-file
        run: |
          task -t Taskfile.yaml decrypt-file \
            AGE_FILE=/tmp/test-age/keys.txt \
            INPUT_FILE=/tmp/test-secrets.enc.yaml \
            OUTPUT_FILE=/tmp/test-secrets.dec.yaml
          test -f /tmp/test-secrets.dec.yaml
          # Verify decrypted content contains the expected values (SOPS may change formatting)
          grep -q "age_key: c29tZS1zZWNyZXQta2V5" /tmp/test-secrets.dec.yaml
          grep -q "cloudflare: Y2xvdWRmbGFyZS10b2tlbg==" /tmp/test-secrets.dec.yaml
          echo "secrets:local:decrypt-file passed"

      - name: Summary
        run: |
          echo "All Local Secrets tasks tested successfully:"
          echo "  - secrets:local:ensure-dependencies"
          echo "  - secrets:local:create-age-keypair"
          echo "  - secrets:local:encrypt-file"
          echo "  - secrets:local:decrypt-file"
          echo ""
          echo "Tasks not tested (require 1Password):"
          echo "  - secrets:onepassword:* (all tasks require 1Password credentials)"
